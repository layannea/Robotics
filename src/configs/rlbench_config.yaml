lmp_config:
  env:
    map_size: 100
    num_waypoints_per_plan: 10000
    max_plan_iter: 1
    visualize: True
  lmps:
    planner:
      prompt_fname: planner_prompt
      model: gpt-4
      max_tokens: 512
      temperature: 0
      query_prefix: '# Query: '
      query_suffix: '.'
      stop:
        - '# Query: '
        - 'objects = '
      maintain_session: False
      include_context: True
      has_return: False
      return_val_name: ret_val
      load_cache: False
      memory:
        enabled: true
        top_k: 1
        min_score: 0.15
        max_score: 0.99
        memory_file: ./memory/episodes.json

    composer:
      prompt_fname: composer_prompt
      model: gpt-4
